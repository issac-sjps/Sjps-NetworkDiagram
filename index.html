<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新莊國小 網路設備管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--white:#fff;--border:#c0c8d4;--border2:#e2e8f0;
  --text:#1a2332;--text2:#4a5568;--text3:#9aa5b4;
  --A:#1a56c8;--A-bg:#e8f0fd;--A-bd:#93c5fd;
  --B:#15803d;--B-bg:#dcfce7;--B-bd:#86efac;
  --F:#b45309;--F-bg:#fef3c7;--F-bd:#fcd34d;
  --C:#7e22ce;--C-bg:#f3e8ff;--C-bd:#c4b5fd;
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:12px}
.bar{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 14px;height:44px;box-shadow:0 2px 5px rgba(0,0,0,.07);gap:0}
.logo{font-size:13px;font-weight:900;color:var(--text);margin-right:12px;white-space:nowrap}
.logo em{color:var(--A);font-style:normal}
.nav{display:flex;gap:0}
.ntab{padding:0 12px;height:44px;display:flex;align-items:center;border:none;background:none;font-family:var(--sans);font-size:12px;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.ntab:hover{color:var(--text);background:#f8f9fa}
.ntab.on{color:var(--A);border-bottom-color:var(--A);font-weight:700}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.sq{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:4px 9px}
.sq input{background:none;border:none;outline:none;font-family:var(--sans);font-size:12px;width:150px;color:var(--text)}
.sq input::placeholder{color:var(--text3)}
.xbtn{padding:4px 10px;background:var(--white);border:1px solid var(--border);border-radius:5px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--sans);transition:all .15s;white-space:nowrap}
.xbtn:hover{border-color:var(--A);color:var(--A)}
.view{display:none}
.view.on{display:block}
#v-net.on{display:flex}
#v-net{height:calc(100vh - 44px);flex-direction:row}

/* ── PLAN ── */
#v-plan{padding:12px 14px 24px;overflow-x:auto}
.legend{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap;font-size:10px;color:var(--text2);background:var(--white);border:1px solid var(--border2);border-radius:6px;padding:6px 11px}
.lg{display:flex;align-items:center;gap:3px}
.lgsq{width:9px;height:9px;border-radius:2px;border:1.5px solid}

/* building block stacked vertically */
.bblock{margin-bottom:18px;width:max-content}
.bhdr{display:flex;align-items:center;gap:8px;padding:6px 11px;color:#fff;font-size:13px;font-weight:700;letter-spacing:.04em;border-radius:5px 5px 0 0}
.bF .bhdr{background:var(--F)}
.bB .bhdr{background:var(--B)}
.bA .bhdr{background:var(--A)}
.bC .bhdr{background:var(--C)}

/* floor table */
.ftbl{border-collapse:collapse;background:var(--white);border:2px solid var(--border)}
.ftbl td,.ftbl th{border:1.5px solid var(--border);padding:0;vertical-align:top}
.fl{background:var(--text);color:#fff;font-size:10px;font-weight:700;padding:3px 6px;text-align:center;width:26px;min-width:26px;border:1.5px solid #333!important;white-space:nowrap}
.sep{width:7px;min-width:7px;background:#d1d5db;border:1.5px solid var(--border)!important}

/* room cell */
.rm{padding:4px 6px;cursor:pointer;min-width:98px;width:98px;min-height:60px;position:relative;transition:filter .1s}
.rm:hover{filter:brightness(.91)}
.rm.cls{background:#dbeafe;border-left:3px solid #60a5fa!important}
.rm.off{background:#fefce8;border-left:3px solid #fbbf24!important}
.rm.lab{background:#d1fae5;border-left:3px solid #34d399!important}
.rm.spc{background:#ede9fe;border-left:3px solid #a78bfa!important}
.rm.sto{background:#f1f5f9;border-left:3px solid #94a3b8!important;cursor:default}
.rm-id{font-family:var(--mono);font-size:7.5px;color:var(--text3);line-height:1;margin-bottom:1px}
.rm-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.25}
.rm-sub{font-size:9px;color:var(--text2)}
.rm-ext{font-size:9px;color:var(--text2);font-family:var(--mono);margin-top:1px}
.rm-note{font-size:8px;color:#ef4444}
.rm-dots{position:absolute;bottom:3px;right:3px;display:flex;gap:2px}
.dot{width:5px;height:5px;border-radius:50%}
.dot-ip{background:var(--B)}.dot-ap{background:var(--A)}.dot-e{background:#e2e8f0}
.ec{background:repeating-linear-gradient(45deg,var(--bg),var(--bg) 3px,#e2e8f0 3px,#e2e8f0 6px);min-width:98px;width:98px;min-height:60px}

/* switch row */
.swrow td{background:#f0f4ff;border:1px solid var(--A-bd)!important;padding:4px 8px}
.sw-cell{display:flex;align-items:center;gap:6px;font-size:10px}
.sw-cell label{display:flex;align-items:center;gap:3px;color:var(--A);cursor:pointer;white-space:nowrap}
.swip{font-family:var(--mono);font-size:10px;background:var(--white);border:1px solid var(--A-bd);border-radius:3px;padding:2px 6px;outline:none;width:120px;color:var(--A)}
.swip:focus{border-color:var(--A)}

/* ── MODAL ── */
.ovl{position:fixed;inset:0;background:rgba(10,15,25,.48);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.ovl.on{display:flex}
.modal{background:var(--white);border-radius:9px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.22)}
.mhdr{padding:12px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.mttl{font-size:14px;font-weight:700}
.mmeta{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px}
.mcls{background:none;border:none;font-size:16px;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px}
.mcls:hover{background:var(--bg)}
.mbody{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.fsec{border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.fst{background:#f9fafb;padding:5px 10px;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border2)}
.frow{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid #f3f4f6}
.frow:last-child{border-bottom:none}
.flbl{font-size:11px;color:var(--text2);width:80px;flex-shrink:0}
.fin{flex:1;background:#f9fafb;border:1px solid var(--border2);border-radius:4px;padding:5px 8px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
.fin:focus{border-color:var(--A)}
.fin::placeholder{color:var(--text3)}
.togwrap{display:flex;align-items:center;gap:6px}
.tog{width:32px;height:17px;position:relative;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:#d1d5db;border-radius:9px;cursor:pointer;transition:.2s}
.tsl::after{content:'';position:absolute;width:11px;height:11px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}
.tog input:checked+.tsl{background:var(--A)}
.tog input:checked+.tsl::after{transform:translateX(15px)}
.mfoot{padding:9px 16px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:6px;position:sticky;bottom:0;background:var(--white)}
.btn{padding:5px 14px;border-radius:4px;border:none;font-family:var(--sans);font-size:12px;cursor:pointer;font-weight:600;transition:all .15s}
.btnp{background:var(--A);color:#fff}.btnp:hover{background:#1347a0}
.btng{background:var(--bg);color:var(--text2);border:1px solid var(--border)}.btng:hover{border-color:var(--text2)}

/* ── NETWORK ── */
.nside{width:190px;flex-shrink:0;background:#0d1117;border-right:1px solid #21262d;display:flex;flex-direction:column}
.nshdr{padding:8px 11px;border-bottom:1px solid #21262d;font-size:11px;font-weight:700;color:#8b949e}
.ntools{padding:6px;display:flex;flex-direction:column;gap:3px;border-bottom:1px solid #21262d}
.ntb{padding:5px 9px;border-radius:4px;border:1px solid #21262d;background:none;color:#8b949e;font-family:var(--sans);font-size:11px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:5px;transition:all .15s}
.ntb:hover{border-color:#388bfd;color:#c9d1d9}
.ntb.on{border-color:#58a6ff;color:#58a6ff;background:rgba(88,166,255,.1)}
.ntb.del{border-color:#3d1515;color:#f85149}.ntb.del:hover{border-color:#f85149;background:rgba(248,81,73,.1)}
.nleg{padding:8px 11px;font-size:10px;color:#484f58;flex:1;overflow-y:auto}
.nli{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.nll{height:2px;width:18px;border-radius:1px}
.narea{flex:1;position:relative;overflow:hidden;background:#0d1117}
#svgnet{width:100%;height:100%}

/* PEOPLE */
.ptblw{background:var(--white);border:1px solid var(--border);border-radius:7px;overflow:hidden;max-width:860px}
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{background:#f9fafb;padding:6px 9px;font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border2);text-align:left}
.ptbl td{padding:5px 9px;border-bottom:1px solid #f5f6f7;vertical-align:middle;font-size:12px}
.ptbl tr:last-child td{border-bottom:none}
.ptbl tr:hover td{background:#fafbfc}
.psel{background:#f9fafb;border:1px solid var(--border2);border-radius:3px;color:var(--text);padding:2px 4px;font-size:11px;font-family:var(--sans);outline:none;cursor:pointer;max-width:155px}
.pip{background:#f9fafb;border:1px solid var(--border2);border-radius:3px;color:var(--A);font-family:var(--mono);font-size:11px;padding:2px 6px;outline:none;width:140px}
.pip:focus,.psel:focus{border-color:var(--A)}
.pdot{width:6px;height:6px;border-radius:50%;display:inline-block}
.pdot.on{background:#16a34a}.pdot.off{background:#d1d5db}

/* SEARCH */
.sbig{display:flex;align-items:center;gap:7px;background:var(--white);border:2px solid var(--border);border-radius:7px;padding:9px 12px;margin-bottom:12px}
.sbig:focus-within{border-color:var(--A)}
.sbig input{flex:1;background:none;border:none;outline:none;font-size:14px;font-family:var(--sans);color:var(--text)}
.sbig input::placeholder{color:var(--text3)}
.scard{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:9px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.scard:hover{border-color:var(--A);transform:translateX(2px)}
.sid{font-family:var(--mono);font-size:9px;background:var(--bg);padding:1px 4px;border-radius:2px;border:1px solid var(--border)}
.snm{font-size:13px;font-weight:600;margin:0 5px}
.sxt{font-family:var(--mono);font-size:9px;color:var(--F)}
.sip{font-family:var(--mono);font-size:11px;color:var(--B);margin-top:3px}
.sloc{font-size:10px;color:var(--text2);margin-top:2px}
mark{background:rgba(26,86,200,.12);color:var(--A);border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">🏫 新莊國小<em>｜</em>網路設備管理</div>
  <nav class="nav">
    <button class="ntab on" data-v="plan" onclick="sv('plan')">📐 校園配置圖</button>
    <button class="ntab" data-v="net" onclick="sv('net')">🔌 網路架構</button>
    <button class="ntab" data-v="people" onclick="sv('people')">👤 人員</button>
    <button class="ntab" data-v="search" onclick="sv('search')">🔍 搜尋</button>
  </nav>
  <div class="bar-r">
    <div class="sq"><span>🔍</span><input placeholder="快速搜尋..." oninput="qs(this.value)"></div>
    <button class="xbtn" onclick="exportAll()">📥 匯出CSV</button>
  </div>
</div>

<!-- PLAN -->
<div id="v-plan" class="view on">
  <div class="legend">
    <strong style="font-size:10px;margin-right:2px">凡例：</strong>
    <span class="lg"><span class="lgsq" style="background:#dbeafe;border-color:#60a5fa"></span>普通教室</span>
    <span class="lg"><span class="lgsq" style="background:#fefce8;border-color:#fbbf24"></span>辦公室</span>
    <span class="lg"><span class="lgsq" style="background:#d1fae5;border-color:#34d399"></span>電腦/e化</span>
    <span class="lg"><span class="lgsq" style="background:#ede9fe;border-color:#a78bfa"></span>專科/特殊</span>
    <span class="lg"><span class="lgsq" style="background:#f1f5f9;border-color:#94a3b8"></span>儲藏/其他</span>
    <span class="lg"><span class="dot dot-ip" style="width:7px;height:7px;border-radius:50%;display:inline-block;background:#15803d"></span>已填IP</span>
    <span class="lg"><span class="dot dot-ap" style="width:7px;height:7px;border-radius:50%;display:inline-block;background:#1a56c8"></span>AP已設</span>
    <span style="margin-left:auto;font-size:10px;color:var(--text3)">點擊任意教室格 → 設定IP與設備資訊</span>
  </div>
  <div id="planArea"></div>
</div>

<!-- NET -->
<div id="v-net" class="view">
  <div class="nside">
    <div class="nshdr">🔌 網路架構圖</div>
    <div class="ntools">
      <button class="ntb on" id="tb-sel" onclick="nm('sel')">👆 選取</button>
      <button class="ntb" id="tb-conn" onclick="nm('conn')">🔗 接線</button>
      <button class="ntb del" onclick="delSel()">🗑 刪除選取</button>
    </div>
    <div style="padding:7px 11px;border-bottom:1px solid #21262d">
      <div style="font-size:9px;color:#484f58;margin-bottom:4px;font-weight:700">顯示棟樓</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px" id="nbf"></div>
    </div>
    <div class="nleg">
      <div style="font-size:10px;font-weight:700;color:#8b949e;margin-bottom:5px">線路類型</div>
      <div class="nli"><div class="nll" style="background:#58a6ff"></div>網路線 Cat5e/6</div>
      <div class="nli"><div class="nll" style="background:#f0b429"></div>光纖</div>
      <div class="nli"><div class="nll" style="background:#3fb950"></div>主幹 Trunk</div>
      <div class="nli"><div class="nll" style="background:#a78bfa"></div>Wi-Fi AP</div>
      <div class="nli"><div class="nll" style="background:#f85149"></div>跨棟連接</div>
      <div style="margin-top:9px;font-size:9px;color:#30363d;line-height:1.9">接線：點「接線」→點第1節點→點第2節點→填資訊<br>點線路可刪除</div>
    </div>
  </div>
  <div class="narea" id="narea">
    <svg id="svgnet" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"></svg>
    <div id="nst" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.35);color:#58a6ff;padding:4px 12px;border-radius:12px;font-size:10px;pointer-events:none;font-family:'JetBrains Mono';opacity:0;transition:opacity .2s;white-space:nowrap"></div>
  </div>
</div>

<!-- PEOPLE -->
<div id="v-people" class="view" style="padding:12px 14px 24px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <h2 style="font-size:13px;font-weight:700">👤 人員管理</h2>
    <button class="xbtn" onclick="exportPpl()">📥 匯出CSV</button>
  </div>
  <div class="ptblw">
    <table class="ptbl">
      <thead><tr><th></th><th>職稱</th><th>姓名</th><th>所屬辦公室</th><th>電腦 IP</th></tr></thead>
      <tbody id="pplB"></tbody>
    </table>
  </div>
</div>

<!-- SEARCH -->
<div id="v-search" class="view" style="padding:20px;max-width:660px;margin:0 auto">
  <div class="sbig"><span style="font-size:16px">🔍</span><input id="srI" placeholder="教室名稱、代碼、IP位址、分機..." oninput="doSearch(this.value)"></div>
  <div id="srR"><div style="text-align:center;color:var(--text3);padding:26px;font-size:12px">輸入關鍵字開始搜尋</div></div>
</div>

<!-- ROOM MODAL -->
<div class="ovl" id="rmOvl">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdr">
      <div><div class="mttl" id="rmTtl"></div><div class="mmeta" id="rmMeta"></div></div>
      <button class="mcls" onclick="closeRm()">✕</button>
    </div>
    <div class="mbody" id="rmBody"></div>
    <div class="mfoot">
      <button class="btn btng" onclick="closeRm()">取消</button>
      <button class="btn btnp" onclick="saveRm()">💾 儲存</button>
    </div>
  </div>
</div>

<!-- CONN MODAL -->
<div class="ovl" id="cnOvl">
  <div class="modal" style="background:#161b22;border:1px solid #30363d;width:290px" onclick="event.stopPropagation()">
    <div class="mhdr" style="background:#161b22;border-color:#30363d">
      <div><div class="mttl" id="cnTtl" style="color:#c9d1d9;font-size:12px"></div></div>
      <button class="mcls" style="color:#484f58" onclick="closeCn()">✕</button>
    </div>
    <div class="mbody" style="background:#161b22">
      <div class="fsec" style="border-color:#30363d">
        <div class="fst" style="background:#0d1117;border-color:#30363d;color:#484f58">🔌 線路設定</div>
        <div class="frow" style="border-color:#21262d">
          <span class="flbl" style="color:#484f58">類型</span>
          <select class="fin" id="cnType" style="background:#0d1117;border-color:#30363d;color:#c9d1d9">
            <option value="eth">網路線 Cat5e/6</option>
            <option value="fiber">光纖</option>
            <option value="trunk">主幹 Trunk</option>
            <option value="wifi">Wi-Fi AP</option>
            <option value="cross">跨棟連接</option>
          </select>
        </div>
        <div class="frow" style="border-color:#21262d"><span class="flbl" style="color:#484f58">標籤</span><input class="fin" id="cnLbl" placeholder="G0/1..." style="background:#0d1117;border-color:#30363d;color:#c9d1d9"></div>
        <div class="frow" style="border-color:#21262d"><span class="flbl" style="color:#484f58">頻寬</span><input class="fin" id="cnBw" placeholder="1Gbps..." style="background:#0d1117;border-color:#30363d;color:#c9d1d9"></div>
      </div>
    </div>
    <div class="mfoot" style="background:#161b22;border-color:#30363d">
      <button class="btn btng" style="background:#21262d;border-color:#30363d;color:#8b949e" onclick="closeCn()">取消</button>
      <button class="btn btnp" style="background:#238636" onclick="saveCn()">儲存</button>
    </div>
  </div>
</div>

<script>
const BLDG={F:{name:'至誠樓',col:'#b45309'},B:{name:'至美樓',col:'#15803d'},A:{name:'至善樓',col:'#1a56c8'},C:{name:'新莊樓',col:'#7e22ce'}};

// ── FLOOR PLAN DATA ──────────────────────────────────────────────────────────
// Each building: floors array (top→bottom), rooms per floor (left→right)
// A building has left/right wings separated by a narrow column
const PLAN={
F:{floors:['4F','3F','2F','1F'],
  rooms:{
    '4F':[{id:'F404',n:'五年08班',ext:'844',t:'cls'},{id:'F403',n:'五年07班',ext:'843',t:'cls'},{id:'F402',n:'五年06班',ext:'842',t:'cls'},{id:'F401',n:'樂活教室',ext:'841',t:'spc'}],

// ── BUILD PLAN ────────────────────────────────────────────────────────────────
function buildPlan(){
  const area=document.getElementById('planArea');
  let h='';
  const bkeys=['F','B','A','C'];
  bkeys.forEach(bk=>{
    const b=PLAN[bk]; const bc=BLDG[bk].col; const bn=BLDG[bk].name;
    const sw=gSW(bk,'1F');
    h+=`<div class="bblock b${bk}">`;
    // Header
    h+=`<div class="bhdr" style="background:${bc}">`;
    h+=`${bn}（${bk}棟）`;
    h+=`<div style="margin-left:auto;display:flex;align-items:center;gap:7px;font-weight:400;font-size:11px">`;
    h+=`<label style="display:flex;align-items:center;gap:4px;opacity:.9;cursor:pointer"><input type="checkbox" ${sw.has?'checked':''} onchange="setSW('${bk}','1F','has',this.checked)" style="accent-color:#fff"> ⇌ 交換機</label>`;
    h+=`<input class="swip" value="${sw.ip||''}" placeholder="Switch IP" oninput="setSW('${bk}','1F','ip',this.value)" ${sw.has?'':'disabled'} style="background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;::placeholder{color:rgba(255,255,255,.5)}">`;
    h+=`</div></div>`;
    // Table
    h+=`<table class="ftbl">`;
    if(bk==='A'){
      // Dual wing: find max cols for each wing
      const maxL=Math.max(...b.floors.map(f=>(b.left[f]||[]).length));
      const maxR=Math.max(...b.floors.map(f=>(b.right[f]||[]).length));
      b.floors.forEach(f=>{
        const lRooms=b.left[f]||[];
        const rRooms=b.right[f]||[];
        h+=`<tr><td class="fl">${f}</td>`;
        for(let i=0;i<maxL;i++) h+=i<lRooms.length?rmTd(lRooms[i]):ecTd();
        h+=`<td class="sep" rowspan="1"></td>`;
        for(let i=0;i<maxR;i++) h+=i<rRooms.length?rmTd(rRooms[i]):ecTd();
        h+=`</tr>`;
      });
      // Switch row
      h+=`<tr class="swrow"><td></td><td colspan="${maxL+maxR+1}"><div class="sw-cell"><label><input type="checkbox" ${sw.has?'checked':''} onchange="setSW('${bk}','1F','has',this.checked)" style="accent-color:var(--A)"> 本棟交換機</label><input class="swip" value="${sw.ip||''}" placeholder="Switch IP" oninput="setSW('${bk}','1F','ip',this.value)"></div></td></tr>`;
    } else {
      const maxC=Math.max(...b.floors.map(f=>(b.rooms[f]||[]).length));
      b.floors.forEach(f=>{
        const rooms=b.rooms[f]||[];
        h+=`<tr><td class="fl">${f==='B1'?'B1':f}</td>`;
        for(let i=0;i<maxC;i++){
          if(i<rooms.length){
            const r=rooms[i];
            if(r.wide) h+=`<td colspan="${r.wide}">${rmDiv(r)}</td>`;
            else h+=rmTd(r);
          } else h+=ecTd();
        }
        h+=`</tr>`;
      });
      h+=`<tr class="swrow"><td></td><td colspan="${maxC}"><div class="sw-cell"><label><input type="checkbox" ${sw.has?'checked':''} onchange="setSW('${bk}','1F','has',this.checked)" style="accent-color:var(--A)"> 本棟交換機</label><input class="swip" value="${sw.ip||''}" placeholder="Switch IP" oninput="setSW('${bk}','1F','ip',this.value)"></div></td></tr>`;
    }
    h+=`</table></div>`;
  });
  area.innerHTML=h;
}

function rmTd(r){ return `<td>${rmDiv(r)}</td>`; }
function ecTd(){ return `<td class="ec"></td>`; }
function rmDiv(r){
  const rd=gR(r.id);
  const ips=[rd.tpc,rd.pc1,rd.pc2,rd.mgmt,rd.prt].filter(Boolean);
  const ipDots=ips.map(ip=>`<span class="dot dot-ip" title="${ip}"></span>`).join('');
  const apDot=r.t!=='sto'?(rd.apOn?`<span class="dot dot-ap" title="AP${rd.apIP?': '+rd.apIP:''}"></span>`:`<span class="dot dot-e" title="AP停用"></span>`):'';
  const cls=r.t==='sto'?'rm sto':'rm '+r.t;
  const onclick=r.t==='sto'?'':` onclick="openRm('${r.id}')"`;
  return `<div class="${cls}"${onclick}>
    <div class="rm-id">${r.id}</div>
    <div class="rm-name">${r.n}</div>
    ${r.sub?`<div class="rm-sub">${r.sub}</div>`:''}
    ${r.ext?`<div class="rm-ext">☎ ${r.ext}</div>`:''}
    ${r.note?`<div class="rm-note">${r.note}</div>`:''}
    <div class="rm-dots">${apDot}${ipDots}</div>
  </div>`;
}

function setSW(b,f,k,v){
  const key=b+'_'+f; if(!D.sw[key]) D.sw[key]={has:true,ip:''};
  D.sw[key][k]=v; sd(); buildPlan();
}

// ── ROOM MODAL ────────────────────────────────────────────────────────────────
let curRm=null;
function allRooms(){
  const out=[];
  for(const bk of ['F','B','A','C']){
    const b=PLAN[bk];
    if(bk==='A'){
      for(const f of b.floors){ (b.left[f]||[]).forEach(r=>out.push({...r,bk,f})); (b.right[f]||[]).forEach(r=>out.push({...r,bk,f})); }
    } else {
      for(const f of b.floors){ (b.rooms[f]||[]).forEach(r=>out.push({...r,bk,f})); }
    }
  }
  return out;
}

// ── NETWORK DIAGRAM ───────────────────────────────────────────────────────────
let netMode='sel',selNode=null,selConn=null,pendNode=null;
const CC={eth:'#58a6ff',fiber:'#f0b429',trunk:'#3fb950',wifi:'#a78bfa',cross:'#f85149'};
let nBF=new Set(Object.keys(BLDG));
function drawNet(){
  document.getElementById('nbf').innerHTML=Object.keys(BLDG).map(b=>
    `<button onclick="toggleNB('${b}',this)" style="padding:2px 7px;border-radius:3px;border:1px solid ${nBF.has(b)?BLDG[b].col:'#21262d'};background:${nBF.has(b)?'rgba('+hexRGB(BLDG[b].col)+',0.15)':'none'};color:${nBF.has(b)?BLDG[b].col:'#484f58'};font-size:9px;cursor:pointer;font-family:var(--mono);transition:all .15s">${b}</button>`
  ).join('');
  const svg=document.getElementById('svgnet'); svg.innerHTML='';
  const nW=85,nH=40,gX=100,gY=52,mX=28,mY=36;
  const rooms=allRooms().filter(r=>nBF.has(r.bk));
  const floord=['5F','4F','3F','2F','1F','B1'];
  const bkeys=Object.keys(BLDG).filter(b=>nBF.has(b));
  const np={};
  bkeys.forEach((b,bi)=>{
    floord.forEach((f,fi)=>{
      rooms.filter(r=>r.bk===b&&r.f===f).forEach((r,ri)=>{
        np[r.id]={x:mX+bi*(nW+gX-nW)*5+ri*(nW+8),y:mY+fi*gY,w:nW,h:nH,b,f};
      });
    });
  });
  const allP=Object.values(np); if(!allP.length){svg.innerHTML=`<text x="50%" y="50%" text-anchor="middle" fill="#484f58" font-size="12" font-family="Noto Sans TC">請選取要顯示的棟樓</text>`;return;}
  const svgW=Math.max(...allP.map(p=>p.x+p.w))+mX;
  const svgH=Math.max(...allP.map(p=>p.y+p.h))+mY;
  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`); svg.style.minWidth=svgW+'px'; svg.style.minHeight=svgH+'px';
  const defs=se('defs');
  Object.entries(CC).forEach(([t,c])=>{const m=se('marker',{id:'a'+t,markerWidth:'7',markerHeight:'5',refX:'7',refY:'2.5',orient:'auto'});m.appendChild(se('polygon',{points:'0 0,7 2.5,0 5',fill:c}));defs.appendChild(m);});
  svg.appendChild(defs);
  bkeys.forEach(b=>{
    const bR=rooms.filter(r=>r.bk===b); const bP=bR.map(r=>np[r.id]).filter(Boolean); if(!bP.length) return;
    const x0=Math.min(...bP.map(p=>p.x))-4,x1=Math.max(...bP.map(p=>p.x+p.w))+4;
    const g=se('g');
    g.appendChild(se('rect',{x:x0,y:2,width:x1-x0,height:26,rx:'3',fill:BLDG[b].col,opacity:'.18'}));
    const t=se('text',{x:(x0+x1)/2,y:20,'text-anchor':'middle',fill:BLDG[b].col,'font-size':'10','font-weight':'700','font-family':'Noto Sans TC'}); t.textContent=BLDG[b].name+'('+b+')'; g.appendChild(t); svg.appendChild(g);
  });
  D.conns.forEach(cn=>{
    const p1=np[cn.from],p2=np[cn.to]; if(!p1||!p2) return;
    const c=CC[cn.type]||CC.eth,isSel=selConn===cn.id;
    const x1=p1.x+p1.w/2,y1=p1.y+p1.h/2,x2=p2.x+p2.w/2,y2=p2.y+p2.h/2;
    const g=se('g',{cursor:'pointer'});
    g.appendChild(se('line',{x1,y1,x2,y2,stroke:c,'stroke-width':isSel?3:2,'stroke-dasharray':cn.type==='cross'?'6,4':'none','marker-end':'url(#a'+cn.type+')'}));
    if(cn.label||cn.bw){const t=se('text',{x:(x1+x2)/2,y:(y1+y2)/2-5,'text-anchor':'middle',fill:c,'font-size':'8','font-family':'JetBrains Mono'});t.textContent=(cn.label||'')+(cn.bw?' '+cn.bw:'');g.appendChild(t);}
    g.addEventListener('click',e=>{e.stopPropagation();if(netMode==='sel'){selConn=cn.id;selNode=null;drawNet();}});
    svg.appendChild(g);
  });
  rooms.forEach(r=>{
    const pos=np[r.id]; if(!pos) return;
    const rd=gR(r.id),hasIP=[rd.tpc,rd.pc1,rd.pc2,rd.mgmt].some(Boolean),bc=BLDG[r.bk].col;
    const isSel=selNode===r.id||pendNode===r.id;
    const g=se('g',{cursor:'pointer',id:'nd-'+r.id});
    g.appendChild(se('rect',{x:pos.x,y:pos.y,width:pos.w,height:pos.h,rx:'3',fill:'#161b22',stroke:isSel?'#f0b429':bc,'stroke-width':isSel?2.5:1.5}));
    g.appendChild(se('rect',{x:pos.x,y:pos.y,width:pos.w,height:3,rx:'2',fill:bc}));
    const nm=r.n.length>10?r.n.substring(0,9)+'…':r.n;
    const t1=se('text',{x:pos.x+pos.w/2,y:pos.y+16,'text-anchor':'middle',fill:'#c9d1d9','font-size':'8.5','font-family':'Noto Sans TC'}); t1.textContent=nm; g.appendChild(t1);
    const t2=se('text',{x:pos.x+3,y:pos.y+pos.h-4,'text-anchor':'start',fill:'#30363d','font-size':'7','font-family':'JetBrains Mono'}); t2.textContent=r.id; g.appendChild(t2);
    g.appendChild(se('circle',{cx:pos.x+pos.w-6,cy:pos.y+pos.h-6,r:2.5,fill:hasIP?'#3fb950':'#21262d'}));
    if(rd.apOn) g.appendChild(se('circle',{cx:pos.x+pos.w-12,cy:pos.y+pos.h-6,r:2.5,fill:rd.apIP?'#a78bfa':'#21262d'}));
    g.addEventListener('click',e=>{e.stopPropagation();onNC(r.id);});
    svg.appendChild(g);
  });
  floord.forEach(f=>{
    const fp=Object.values(np).find(p=>p.f===f);
    if(fp){const t=se('text',{x:4,y:fp.y+fp.h/2+3,'text-anchor':'start',fill:'#484f58','font-size':'8','font-family':'JetBrains Mono'});t.textContent=f;svg.appendChild(t);}
  });
  svg.addEventListener('click',()=>{selNode=null;selConn=null;pendNode=null;nst('');drawNet();});
}
function toggleNB(b){if(nBF.has(b))nBF.delete(b);else nBF.add(b);drawNet();}
function nst(m){const el=document.getElementById('nst');el.textContent=m;el.style.opacity=m?'1':'0';}
function onNC(id){
  if(netMode==='conn'){
    if(!pendNode){pendNode=id;selNode=id;drawNet();nst('已選：'+id+'　→ 點第二個節點');}
    else if(pendNode!==id){
      document._cnN=[pendNode,id]; document.getElementById('cnTtl').textContent=pendNode+' ─── '+id;
      ['cnType','cnLbl','cnBw'].forEach(x=>document.getElementById(x).value='');
      document.getElementById('cnType').value='eth';
      document.getElementById('cnOvl').classList.add('on');
    }
  } else {selNode=id;selConn=null;drawNet();}
}
function nm(m){netMode=m;pendNode=null;selNode=null;['sel','conn'].forEach(x=>document.getElementById('tb-'+x)?.classList.remove('on'));document.getElementById('tb-'+m)?.classList.add('on');if(m==='conn')nst('接線：點第一個節點');drawNet();}
function delSel(){if(selConn){D.conns=D.conns.filter(x=>x.id!==selConn);selConn=null;sd();}selNode=null;drawNet();}
function closeCn(){document.getElementById('cnOvl').classList.remove('on');pendNode=null;selNode=null;drawNet();}
function saveCn(){const[a,b]=document._cnN||[];if(a&&b)D.conns.push({id:'c'+Date.now(),from:a,to:b,type:document.getElementById('cnType').value,label:document.getElementById('cnLbl').value.trim(),bw:document.getElementById('cnBw').value.trim()});sd();closeCn();drawNet();}
function se(tag,a={}){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(a).forEach(([k,v])=>el.setAttribute(k,v));return el;}
function hexRGB(hex){return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}

// ── PEOPLE ────────────────────────────────────────────────────────────────────
const offList=allRooms().filter(r=>r.t==='off').map(r=>({id:r.id,nm:r.n}));
function renderPpl(){
  document.getElementById('pplB').innerHTML=PERSONNEL.map(p=>{
    const pd=gP(p.id),off=pd.off||p.def;
    const opts=`<option value="">— 未設定 —</option>`+offList.map(o=>`<option value="${o.id}"${off===o.id?' selected':''}>${o.nm}(${o.id})</option>`).join('');
    return `<tr><td><span class="pdot ${pd.ip?'on':'off'}"></span></td><td>${p.title}</td>
      <td><input style="background:#f9fafb;border:1px solid var(--border2);border-radius:3px;padding:2px 5px;font-size:11px;outline:none;width:72px;color:var(--text)" value="${pd.name||''}" placeholder="姓名" oninput="sPD('${p.id}','name',this.value)"></td>
      <td><select class="psel" onchange="sPD('${p.id}','off',this.value)">${opts}</select></td>
      <td><input class="pip" value="${pd.ip||''}" placeholder="192.168.x.x" oninput="sPD('${p.id}','ip',this.value)"></td></tr>`;
  }).join('');
}
function sPD(id,k,v){if(!D.p[id])D.p[id]={};D.p[id][k]=v.trim();sd();}
function exportPpl(){dlCSV('職稱,姓名,辦公室,電腦IP\n'+PERSONNEL.map(p=>{const d=gP(p.id);return `${p.title},${d.name||''},${d.off||p.def},${d.ip||''}`}).join('\n'),'人員清單.csv');}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function hl(t,q){if(!t||!q)return t||'';return t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);}
function doSearch(q){
  const el=document.getElementById('srR');
  if(!q.trim()){el.innerHTML='<div style="text-align:center;color:var(--text3);padding:26px;font-size:12px">輸入關鍵字開始搜尋</div>';return;}
  q=q.trim().toLowerCase();
  const res=[];
  allRooms().forEach(r=>{
    const rd=gR(r.id);
    const ips=[rd.tpc,rd.pc1,rd.pc2,rd.mgmt,rd.apIP,rd.prt].filter(Boolean);
    const mIP=ips.find(ip=>ip.toLowerCase().includes(q));
    const mN=r.n.toLowerCase().includes(q)||r.id.toLowerCase().includes(q)||r.ext?.includes(q);
    if(mIP||mN) res.push({type:'room',r,ips,mIP});
  });
  PERSONNEL.forEach(p=>{
    const pd=gP(p.id);
    if(p.title.includes(q)||(pd.name||'').includes(q)||(pd.ip||'').toLowerCase().includes(q)) res.push({type:'ppl',p,pd});
  });
  if(!res.length){el.innerHTML=`<div style="text-align:center;color:var(--text3);padding:26px">找不到「${q}」的相關結果</div>`;return;}
  el.innerHTML=res.map(x=>{
    if(x.type==='room'){const{r,ips,mIP}=x;return `<div class="scard" onclick="sv('plan');setTimeout(()=>openRm('${r.id}'),200)"><div><span class="sid">${r.id}</span><span class="snm">${hl(r.n,q)}</span>${r.ext?`<span class="sxt">☎${r.ext}</span>`:''}</div>${mIP?`<div class="sip">🎯 ${hl(mIP,q)}</div>`:''}<div class="sloc">📍 ${BLDG[r.bk].name} ${r.f} ${ips.map(ip=>hl(ip,q)).join(' · ')}</div></div>`;}
    else{const{p,pd}=x;const o=allRooms().find(r=>r.id===(pd.off||p.def));return `<div class="scard"><div><span class="sid">人員</span><span class="snm">${hl(p.title,q)}${pd.name?' · '+hl(pd.name,q):''}</span></div>${pd.ip?`<div class="sip">🎯 ${hl(pd.ip,q)}</div>`:''}<div class="sloc">📍 ${o?BLDG[o.bk].name+' '+o.f+' '+o.n:'辦公室未設定'}</div></div>`;}
  }).join('');
}
function qs(v){if(v.trim()){sv('search');document.getElementById('srI').value=v;doSearch(v);}}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportAll(){
  let csv='IP位址,設備類型,房間名稱,房間代號,棟樓,樓層\n';
  allRooms().forEach(r=>{
    const rd=gR(r.id);
    const add=(ip,t)=>{if(ip)csv+=`${ip},${t},${r.n},${r.id},${BLDG[r.bk].name},${r.f}\n`;};
    if(r.t==='off'){add(rd.pc1,'PC-1');add(rd.pc2,'PC-2');}
    else if(r.t==='lab'){add(rd.mgmt,'管理IP');}
    else if(r.t!=='sto'){add(rd.tpc,'教師PC');}
    if(r.t!=='sto'&&rd.apOn)add(rd.apIP,'AP');
    add(rd.prt,'印表機');
  });
  dlCSV(csv,'IP清單.csv');
}
function dlCSV(c,fn){const b=new Blob(['\ufeff'+c],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildPlan();
</script>
</body>
